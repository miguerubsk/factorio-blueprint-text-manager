name: Deploy to GitHub Pages

on:
  # Se ejecuta automáticamente cada vez que haces un 'push' a la rama principal
  push:
    branches: ["main"]

  # Te permite ejecutar el despliegue a mano desde la pestaña "Actions" de GitHub
  workflow_dispatch:

# Permisos mínimos necesarios para que el bot de GitHub pueda escribir en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se pisen despliegues simultáneos si haces varios commits seguidos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefactos de la Web
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el contenido de la raíz del repositorio
          path: '.'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
