<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factorio Blueprint Text Manager</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn.factorio.com/assets/img/favicon.ico"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="locales/es.js"></script>
    <script src="locales/en.js"></script>
  </head>
  <body>
    <div class="factorio-top-bar">
      <div class="top-bar-left">
        <span class="brand-title">FBP Text Manager</span>
        <button
          class="primary font-compact"
          onclick="processBlueprintString()"
          data-i18n="btn_scan_book"
        ></button>
        <button
          class="secondary font-compact"
          onclick="exportRawJsonFile()"
          data-i18n="btn_export_json"
        ></button>
        <button
          class="success font-compact"
          onclick="applyBatchChanges()"
          data-i18n="btn_apply_batch"
        ></button>
      </div>
      <div class="top-bar-right">
        <div class="factory-stats">
          <img
            id="globalVisitorBadge"
            src=""
            alt="Connecting..."
            class="stats-counter-badge"
          />
        </div>

        <button
          class="accent-btn font-compact"
          onclick="generateAndCopyString()"
          id="btnGenCopy"
          data-i18n="btn_generate_copy"
        ></button>
        <button
          id="btnOpenHelp"
          class="secondary help-btn"
          data-i18n-title="lbl_help_btn"
          aria-haspopup="dialog"
        >
          ?
        </button>
        <div class="lang-selector-container">
          <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="es">ES</option>
            <option value="en">EN</option>
          </select>
        </div>
      </div>
    </div>

    <div class="main-content-wrapper">
      <div class="block-section">
        <h2 data-i18n="ui_step1_title"></h2>
        <textarea
          id="inputString"
          class="raw-string compact-input"
          data-i18n-ph="ph_raw_string"
        ></textarea>
      </div>

      <div class="block-section">
        <h2 data-i18n="ui_option_a_title"></h2>
        <p class="instructions" data-i18n="ui_option_a_instructions"></p>
        <textarea
          id="batchTextarea"
          class="batch-box"
          data-i18n-ph="ph_batch_box"
        ></textarea>
      </div>

      <div class="block-section">
        <h2 data-i18n="ui_option_b_title"></h2>
        <p class="instructions" data-i18n="ui_option_b_instructions"></p>
        <div id="treeViewContainer">
          <p class="empty-tree-msg" data-i18n="ui_empty_tree_msg"></p>
        </div>
      </div>
    </div>

    <textarea id="outputString" style="display: none"></textarea>

    <div id="factorioCatalog" class="catalog-drawer">
      <div class="catalog-header">
        <h3 data-i18n="lbl_catalog_title">CATÁLOGO DE ICONOS</h3>
        <button id="btnCloseCatalog" class="secondary">X</button>
      </div>
      <div class="catalog-search-container hint-anchor">
        <input
          type="text"
          id="catalogSearch"
          data-i18n-ph="ph_search_icon"
          oninput="filterCatalog()"
        />
        <div id="hintCatalogSearch" class="hint-bubble hint-bubble--arrow-up catalog-search-hint" hidden>
          <span data-i18n="hint_catalog_search"></span>
        </div>
      </div>

      <div class="catalog-tabs">
        <button
          class="catalog-tab-link active"
          onclick="switchCatalogTab('logistics', event)"
          data-i18n-title="lbl_tab_logistics"
        >
          <img src="./assets/groups/logistics.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('production', event)"
          data-i18n-title="lbl_tab_production"
        >
          <img src="./assets/groups/production.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('intermediate-products', event)"
          data-i18n-title="lbl_tab_intermediates"
        >
          <img src="./assets/groups/intermediate-products.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('combat', event)"
          data-i18n-title="lbl_tab_military"
        >
          <img src="./assets/groups/combat.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('fluids', event)"
          data-i18n-title="lbl_tab_fluids"
        >
          <img src="./assets/groups/fluids.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('signals', event)"
          data-i18n-title="lbl_tab_signals"
        >
          <img src="./assets/groups/signals.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('enemies', event)"
          data-i18n-title="lbl_tab_enemies"
        >
          <img src="./assets/groups/enemies.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('environment', event)"
          data-i18n-title="lbl_tab_environment"
        >
          <img src="./assets/groups/environment.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('space', event)"
          data-i18n-title="lbl_tab_space"
        >
          <img src="./assets/groups/space.png" alt="" />
        </button>
        <button
          class="catalog-tab-link"
          onclick="switchCatalogTab('other', event)"
          data-i18n-title="lbl_tab_other"
        >
          <img src="./assets/groups/other.png" alt="" />
        </button>
      </div>

      <div class="catalog-grid-wrapper hint-anchor">
        <div id="catalogGrid" class="catalog-grid"></div>
        <div id="hintCatalogGrid" class="hint-bubble catalog-grid-hint" hidden>
          <span data-i18n="hint_catalog_grid"></span>
        </div>
      </div>
    </div>

    <!-- Hint bubbles for onboarding -->
    <div id="hintFindReplace" class="hint-bubble hint-bubble--fixed hint-bubble--arrow-down fr-hint-bubble" hidden>
      <span data-i18n="hint_open_fr"></span>
    </div>
    <div id="hintCatalog" class="catalog-hint-bubble" hidden>
      <span data-i18n="hint_open_catalog"></span>
    </div>
    <div id="hintScan" class="hint-bubble hint-bubble--fixed hint-bubble--arrow-up scan-hint-bubble" hidden>
      <span data-i18n="hint_scan"></span>
    </div>
    <div id="hintBatchApply" class="hint-bubble hint-bubble--fixed hint-bubble--arrow-up batch-hint-bubble" hidden>
      <span data-i18n="hint_batch_apply"></span>
    </div>

    <button
      id="btnOpenFindReplace"
      class="catalog-floating-trigger find-replace-trigger"
      data-i18n-title="lbl_find_replace_btn"
    >
      <span aria-hidden="true">🔍</span>
      <span class="catalog-floating-trigger-label" data-i18n="lbl_find_replace_btn_short"></span>
    </button>
    <button
      id="btnOpenCatalog"
      class="catalog-floating-trigger"
      data-i18n-title="lbl_catalog_btn"
    >
      <span aria-hidden="true">⚙️</span>
      <span class="catalog-floating-trigger-label" data-i18n="lbl_catalog_btn_short"></span>
    </button>

    <div
      id="findReplaceModal"
      class="help-modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="findReplaceModalTitle"
      hidden
    >
      <div class="help-modal find-replace-modal">
        <div class="catalog-header">
          <h3 id="findReplaceModalTitle" data-i18n="lbl_find_replace_title"></h3>
          <button id="btnCloseFindReplace" class="secondary" aria-label="Close">X</button>
        </div>

        <div class="fr-field hint-anchor">
          <label for="frSearch" data-i18n="lbl_fr_search"></label>
          <input type="text" id="frSearch" data-i18n-ph="ph_fr_search" />
          <div id="hintFrSearch" class="hint-bubble hint-bubble--arrow-down fr-search-hint" hidden>
            <span data-i18n="hint_fr_search"></span>
          </div>
        </div>
        <div class="fr-field">
          <label for="frReplace" data-i18n="lbl_fr_replace"></label>
          <input type="text" id="frReplace" data-i18n-ph="ph_fr_replace" />
        </div>

        <div class="fr-options hint-anchor">
          <label class="fr-checkbox">
            <input type="checkbox" id="frCaseInsensitive" checked />
            <span data-i18n="lbl_fr_case_insensitive"></span>
          </label>
          <label class="fr-checkbox">
            <input type="checkbox" id="frUseRegex" />
            <span data-i18n="lbl_fr_use_regex"></span>
          </label>
          <div id="hintFrRegex" class="hint-bubble hint-bubble--arrow-left fr-regex-hint" hidden>
            <span data-i18n="hint_fr_regex"></span>
          </div>
        </div>

        <p id="frMatchCount" class="fr-match-count"></p>
        <p id="frError" class="fr-error" hidden></p>

        <button id="btnApplyFindReplace" class="primary" data-i18n="btn_fr_apply"></button>

        <hr />

        <div class="fr-saved-section hint-anchor">
          <h4 data-i18n="lbl_fr_saved_title"></h4>
          <div id="frSavedList" class="fr-saved-list"></div>
          <button id="btnSaveFindReplace" class="secondary" data-i18n="btn_fr_save"></button>
          <div id="hintFrSaved" class="hint-bubble hint-bubble--arrow-down fr-saved-hint" hidden>
            <span data-i18n="hint_fr_saved"></span>
          </div>
        </div>
      </div>
    </div>

    <div
      id="helpModal"
      class="help-modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="helpModalTitle"
      hidden
    >
      <div class="help-modal">
        <div class="catalog-header">
          <h3 id="helpModalTitle" data-i18n="lbl_help_title"></h3>
          <button id="btnCloseHelp" class="secondary" aria-label="Close">X</button>
        </div>
        <ol class="help-steps">
          <li data-i18n="help_step_1"></li>
          <li data-i18n="help_step_2"></li>
          <li data-i18n="help_step_3"></li>
          <li data-i18n="help_step_4"></li>
          <li data-i18n="help_step_5"></li>
        </ol>
        <p class="help-note" data-i18n="help_note"></p>
      </div>
    </div>

    <script type="module" src="./app.js"></script>

    <footer class="factory-footer font-compact">
      <span>
        <span data-i18n="lbl_footer_author">Desarrollado con ⚙️ por</span>
        <a
          href="https://github.com/miguerubsk"
          target="_blank"
          rel="noopener noreferrer"
          class="footer-link"
          >miguerubsk</a
        >
      </span>
      <span class="footer-separator">|</span>
      <a
        href="https://github.com/miguerubsk/factorio-blueprint-text-manager"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-link footer-repo"
      >
        <svg class="github-icon" viewBox="0 0 16 16" width="14" height="14">
          <path
            fill="currentColor"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
          ></path>
        </svg>
        GitHub Repository
      </a>
    </footer>
  </body>
</html>
